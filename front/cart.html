<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <title>GeniArtHub - Où la créativité rencontre l'intelligence artificielle</title>
</head>
<body>
    <header>
        <div class="row">
            <a href="index.html">
            <img src="img/logo-white.png" alt="Logo du site GeniArtHub">
            </a>
        </div>
    </header>
    <main>
        <section id="listproducts">
            <h1>My cart</h1>
            <p>Quantity :</p>
            <p>infos des produits</p>
            <p>supprimer un produit (localstorage.remove)</p>
            <button>Confirm my order</button>
        </section>
        <section id="form-order">
            <p id="message"></p>
            <form action="#" method="post">
                <label for="name">Lastname :</label>
                <input type="text" name="name" id="name">
                <label for="prenom">Firtsname :</label>
                <input type="text" name="prenom" id="prenom">
                <label for="adresse">Address :</label>
                <input type="text" name="adresse" id="adresse">
                <label for="ville">City :</label>
                <input type="text" name="ville" id="ville">
                <label for="email">Email :</label>
                <input type="text" name="email" id="email">
                <button>Save my datas</button>
            </form>
        </section>
    </main>
    <footer>
        <p><a href="https://www.errantecreation.com/">Errante Creation</a> © 2023 - GeniArtHub</p>
    </footer>

    <!-- <script src="js/panier.js"></script> -->
</body>
</html>
